{% extends "base.html" %}{% block title %}Edit: {{ a.title }}{% endblock %}{% block body %}<div style="max-width:700px;margin:0 auto"><h2 class="pt" style="margin-bottom:1.5rem">Edit News</h2><div class="card" style="padding:2rem"><form method="POST" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="fg"><label class="fl">Title</label><input type="text" name="title" class="fi" value="{{ a.title }}" required></div><div class="fg"><label class="fl">Summary</label><textarea name="summary" class="ft" style="min-height:60px">{{ a.summary or '' }}</textarea></div><div class="fg"><label class="fl">Content</label><textarea name="content" class="ft" style="min-height:200px" required>{{ a.content }}</textarea></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem"><div class="fg"><label class="fl">Category</label><select name="category" class="fs"><option value="general" {% if a.category=='general' %}selected{% endif %}>General</option><option value="tournament" {% if a.category=='tournament' %}selected{% endif %}>Tournament</option><option value="update" {% if a.category=='update' %}selected{% endif %}>Update</option><option value="community" {% if a.category=='community' %}selected{% endif %}>Community</option><option value="patch" {% if a.category=='patch' %}selected{% endif %}>Patch</option><option value="match" {% if a.category=='match' %}selected{% endif %}>Match</option></select></div><div class="fg"><label class="fl">Replace Image</label><input type="file" name="image" class="fi" accept="image/*"></div></div>{% if a.image %}<div class="fg"><label class="fl">Current Image</label><img src="{{ url_for('static',filename='uploads/'+a.image) }}" style="max-width:200px;border-radius:8px;margin-top:.5rem"></div>{% endif %}<div class="fg" style="display:flex;align-items:center;gap:.5rem"><input type="checkbox" name="pinned" {% if a.pinned %}checked{% endif %}> <label>Pinned</label></div><button type="submit" class="btn btn-p btn-bl"><i class="fas fa-save"></i> Save Changes</button></form></div></div>{% endblock %}

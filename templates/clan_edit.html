{% extends "base.html" %}{% block title %}Edit {{ c.name }}{% endblock %}{% block body %}<div style="max-width:600px;margin:0 auto"><h2 class="pt" style="margin-bottom:1.5rem">Edit: [{{ c.tag }}] {{ c.name }}</h2>
<div class="card" style="padding:2rem;margin-bottom:1.5rem"><form method="POST" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="fg"><label class="fl">Name</label><input type="text" name="name" class="fi" value="{{ c.name }}" required minlength="3" maxlength="64"></div>
<div class="fg"><label class="fl">Tag (4 chars)</label><input type="text" name="tag" class="fi" value="{{ c.tag }}" required pattern="[A-Za-z0-9]{4}" maxlength="4"></div>
<div class="fg"><label class="fl">Description</label><textarea name="description" class="ft" style="min-height:80px">{{ c.description or '' }}</textarea></div>
<h3 style="font-weight:700;margin:1rem 0 .75rem">Appearance</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
<div class="fg"><label class="fl">Primary Color</label><input type="color" name="color_primary" value="{{ c.color_primary or '#6c5ce7' }}" style="width:100%;height:40px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg3);cursor:pointer"></div>
<div class="fg"><label class="fl">Background Color</label><input type="color" name="color_secondary" value="{{ c.color_secondary or '#1e1e2e' }}" style="width:100%;height:40px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg3);cursor:pointer"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
<div class="fg"><label class="fl">Logo</label><input type="file" name="logo" class="fi" accept="image/*">{% if c.logo %}<img src="{{ url_for('static',filename='uploads/'+c.logo) }}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;margin-top:.5rem">{% endif %}</div>
<div class="fg"><label class="fl">Background Image</label><input type="file" name="bg_image" class="fi" accept="image/*">{% if c.bg_image %}<img src="{{ url_for('static',filename='uploads/'+c.bg_image) }}" style="width:100px;height:48px;border-radius:8px;object-fit:cover;margin-top:.5rem">{% endif %}</div>
</div>
<h3 style="font-weight:700;margin:1rem 0 .75rem">Settings</h3>
<div class="fg" style="display:flex;flex-direction:column;gap:.5rem">
<div style="display:flex;align-items:center;gap:.5rem"><input type="checkbox" name="recruiting" {% if c.recruiting %}checked{% endif %}> <label>Recruiting (allow new members)</label></div>
<div style="display:flex;align-items:center;gap:.5rem"><input type="checkbox" name="invite_only" {% if c.invite_only %}checked{% endif %}> <label>Invite Only (members can't self-join)</label></div>
</div>
<div class="fg"><label class="fl">Max Members</label><input type="number" name="max_members" class="fi" value="{{ c.max_members }}" min="2" max="200"></div>
{% if is_admin %}
<h3 style="font-weight:700;margin:1rem 0 .75rem;color:var(--err)">Admin Only</h3>
<div class="fg"><label class="fl">Score</label><input type="number" name="score" class="fi" value="{{ c.score }}" min="0"></div>
{% endif %}
<button type="submit" class="btn btn-p btn-bl"><i class="fas fa-save"></i> Save Changes</button>
</form></div></div>{% endblock %}

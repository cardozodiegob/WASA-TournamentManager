{% extends "base.html" %}{% block title %}Users{% endblock %}{% block body %}<h2 class="pt" style="margin-bottom:1.5rem">Users</h2><div class="card" style="margin-bottom:1.5rem;padding:1rem"><form method="GET" style="display:flex;gap:.75rem"><input name="q" class="fi" placeholder="Search…" value="{{ q }}" style="flex:1"><button class="btn btn-p btn-sm"><i class="fas fa-search"></i></button></form></div><div class="card"><table class="dt"><thead><tr><th>ID</th><th>User</th><th>Email</th><th>Role</th><th>ELO</th><th></th></tr></thead><tbody>{% for u in us %}<tr><td>{{ u.id }}</td><td>{{ u.username }}</td><td style="color:var(--tm)">{{ u.email }}</td><td>{% if u.admin %}<span class="b b-ad">Admin</span>{% else %}<span class="b b-m">User</span>{% endif %}</td><td>{{ u.elo }}</td><td style="display:flex;gap:.35rem"><a href="{{ url_for('admin.adm_edit',uid=u.id) }}" class="btn btn-s btn-sm"><i class="fas fa-pen"></i></a><form method="POST" action="{{ url_for('admin.adm_reset_pw',uid=u.id) }}" style="display:inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-d" onclick="return confirm('Reset password?')" title="Reset Password"><i class="fas fa-key"></i></button></form><form method="POST" action="{{ url_for('admin.adm_reset_stats',uid=u.id) }}" style="display:inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-w" onclick="return confirm('Reset ALL stats for {{ u.username }}? This cannot be undone!')" title="Reset Stats"><i class="fas fa-chart-simple"></i></button></form><form method="POST" action="{{ url_for('admin.adm_del_user',uid=u.id) }}" style="display:inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-d" onclick="return confirm('DELETE user {{ u.username }}? This will remove all their matches, alerts, challenges, clan memberships, tournament registrations and ELO history. THIS CANNOT BE UNDONE!')" title="Delete User"><i class="fas fa-user-slash"></i></button></form></td></tr>{% endfor %}</tbody></table></div>{% endblock %}

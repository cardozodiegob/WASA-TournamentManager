{% extends "base.html" %}{% block title %}Settings{% endblock %}{% block body %}
<div style="max-width:600px;margin:0 auto">
<h2 class="pt" style="margin-bottom:1.5rem"><i class="fas fa-gear"></i> Settings</h2>

<div class="card" style="margin-bottom:1.5rem">
<form method="POST" action="{{ url_for('main.user_settings') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<h3 style="font-weight:700;margin-bottom:1rem"><i class="fas fa-palette"></i> Theme</h3>
<div class="fg">
<select name="theme" class="fs">
<option value="light" {% if current_user.theme == 'light' %}selected{% endif %}>Light</option>
<option value="dark" {% if current_user.theme == 'dark' %}selected{% endif %}>Dark</option>
</select>
</div>

<h3 style="font-weight:700;margin:1.5rem 0 1rem"><i class="fas fa-text-height"></i> Font Size</h3>
<div class="fg">
<select name="font_size" class="fs">
<option value="small" {% if current_user.font_size == 'small' %}selected{% endif %}>Small</option>
<option value="medium" {% if current_user.font_size == 'medium' %}selected{% endif %}>Medium</option>
<option value="large" {% if current_user.font_size == 'large' %}selected{% endif %}>Large</option>
</select>
</div>

<h3 style="font-weight:700;margin:1.5rem 0 1rem"><i class="fas fa-bars"></i> Navigation Position</h3>
<div class="fg">
<select name="navbar_position" class="fs">
<option value="top" {% if current_user.navbar_position == 'top' %}selected{% endif %}>Top Navbar</option>
<option value="left" {% if current_user.navbar_position == 'left' %}selected{% endif %}>Left Sidebar</option>
</select>
</div>

<button type="submit" class="btn btn-p" style="margin-top:1rem"><i class="fas fa-save"></i> Save Settings</button>
</form>
</div>
</div>
{% endblock %}

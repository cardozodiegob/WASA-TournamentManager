{% extends "base.html" %}{% block title %}Edit Alert{% endblock %}{% block body %}<div style="max-width:600px;margin:0 auto"><h2 class="pt" style="margin-bottom:1.5rem">Edit Alert #{{ a.id }}</h2><div class="card" style="padding:2rem"><p style="color:var(--tm);font-size:.85rem;margin-bottom:1rem">To: {{ a.user.name() }} · {{ a.created_at.strftime('%b %d, %Y %H:%M') }}</p><form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="fg"><label class="fl">Title</label><input type="text" name="title" class="fi" value="{{ a.title }}" required></div><div class="fg"><label class="fl">Message</label><textarea name="message" class="ft" style="min-height:80px" required>{{ a.message }}</textarea></div><div class="fg"><label class="fl">Type</label><select name="cat" class="fs"><option value="info" {% if a.cat=='info' %}selected{% endif %}>Info</option><option value="success" {% if a.cat=='success' %}selected{% endif %}>Success</option><option value="warning" {% if a.cat=='warning' %}selected{% endif %}>Warning</option><option value="danger" {% if a.cat=='danger' %}selected{% endif %}>Danger</option></select></div><button type="submit" class="btn btn-p btn-bl"><i class="fas fa-save"></i> Save</button></form></div></div>{% endblock %}
